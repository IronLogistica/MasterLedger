{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-header"><span>📥</span> Fattura fornitore — Registrazione Fattura Fornitore <span class="tx-code">Fattura fornitore</span></div>
  <div class="card-body">
    <div class="info-box">
      Genera automaticamente: <strong>Dare</strong> Conto di Costo + IVA a Credito, <strong>Avere</strong> Debiti v/Fornitori.
    </div>
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Fornitore <span class="req">*</span></label>
          <select name="vendor_id" required>
            <option value="">-- Seleziona --</option>
            {% for v in vendors %}<option value="{{ v.id }}">{{ v.code }} — {{ v.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>N° Fattura</label>
          <input type="text" name="invoice_number" placeholder="es. FT-2026-0847">
        </div>
        <div class="form-group">
          <label>Data Fattura</label>
          <input type="date" name="invoice_date">
        </div>
        <div class="form-group">
          <label>Imponibile € <span class="req">*</span></label>
          <input type="number" step="0.01" name="net" required>
        </div>
        <div class="form-group">
          <label>Aliquota IVA %</label>
          <select name="vat_rate">
            <option value="22">22%</option>
            <option value="10">10%</option>
            <option value="4">4%</option>
            <option value="0">Esente</option>
          </select>
        </div>
        <div class="form-group">
          <label>Conto di Costo <span class="req">*</span></label>
          <select name="expense_account_id" required>
            <option value="">-- Seleziona --</option>
            {% for a in expense_accounts %}<option value="{{ a.id }}">{{ a.code }} — {{ a.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Centro di costo CO <span class="req">*</span></label>
          <select name="cost_center_id" required>
            <option value="">-- Seleziona --</option>
            {% for cc in cost_centers %}<option value="{{ cc.id }}">{{ cc.code }} — {{ cc.name }}</option>{% endfor %}
          </select>
          <small>Obbligatorio per attribuire il costo effettivo al CO.</small>
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Testo</label>
          <input type="text" name="description" placeholder="Es. Fornitura acciaio giugno 2026">
        </div>
      </div>
      <div class="btn-row"><button type="submit" class="btn btn-primary">✅ Registra Fattura AP</button></div>
    </form>
  </div>
</div>
{% endblock %}
